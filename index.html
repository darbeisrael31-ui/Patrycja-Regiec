<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACC INVESTMENT (Demo)</title>
  <style>
    body {
      background-color: #000814;
      color: #d4af37;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      padding-top: 100px;
    }
    h1 {
      color: #00ff88;
      font-size: 40px;
      margin-bottom: 10px;
    }
    h2 {
      font-size: 32px;
      margin: 10px 0;
    }
    .profit {
      font-size: 28px;
      color: #00ff88;
      margin-bottom: 40px;
    }
    .tag {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }
    button {
      background-color: #00ff88;
      color: #000;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #d4af37;
      color: #000;
    }
  </style>

  <script>
    // Demo data (safe placeholders)
    const demoData = {
      name: "Sample User",
      profit: "4,500 PLN"
    };

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("name").innerText = demoData.name;
      document.getElementById("profit").innerText = "Profit (Demo): " + demoData.profit;

      // Optional localization (Polish)
      fetch("https://ipapi.co/json/")
        .then(res => res.json())
        .then(data => {
          if (data.country_code === "PL") {
            document.querySelector("h1").innerText = "ACC INWESTYCJA (Demo)";
            document.getElementById("profit").innerText = "Zysk (Demo): " + demoData.profit;
            document.querySelector("button").innerText = "Przejdź do wypłaty";
          }
        })
        .catch(() => {});
    });
  </script>
</head>

<body>
  <h1>ACC INVESTMENT (Demo)</h1>
  <div class="tag">This is a demonstration dashboard (no real funds)</div>

  <h2 id="name">Loading...</h2>
  <div id="profit" class="profit">Loading...</div>

  <button onclick="window.location.href='withdrawal.html'">
    Go to Withdrawal
  </button>
</body>
</html>
